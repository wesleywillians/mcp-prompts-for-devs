name: CI

on:
  # Execute only on pull requests
  pull_request:
    # Run on any pull request, regardless of target branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Check version using the reusable action
    - name: Check version
      uses: ./.github/actions/version-check
      with:
        docker-username: ${{ secrets.DOCKERHUB_USERNAME }}
        docker-token: ${{ secrets.DOCKERHUB_TOKEN }}
        fail-on-existing: 'false'
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    # First, build a specific container for testing
    - name: Build Docker image for testing
      run: |
        cat > Dockerfile.test << 'EOF'
        FROM node:23-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci
        COPY . .
        EOF
        docker build -t wesleywillians/mcp-prompts-for-devs:test -f Dockerfile.test .
    
    # Run tests in this container
    - name: Run tests inside Docker container
      run: |
        docker run --rm wesleywillians/mcp-prompts-for-devs:test npm test
    
    # Then, build the production Dockerfile for validation
    - name: Build production Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: wesleywillians/mcp-prompts-for-devs:prod
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    # Check if the production container was built correctly
    - name: Verify production Docker image
      run: |
        # Verify the image was created
        docker image inspect wesleywillians/mcp-prompts-for-devs:prod
        
        # Check if the container starts correctly
        docker run --name test-prod -d wesleywillians/mcp-prompts-for-devs:prod || true
        sleep 5 # Wait a bit for the container to start
        
        # Display logs
        docker logs test-prod
        
        # Clean up test container
        docker stop test-prod || true
        docker rm test-prod || true 