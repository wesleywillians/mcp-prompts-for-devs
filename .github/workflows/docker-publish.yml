name: Docker Publish

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Use the reusable action to check version
    - name: Check version
      id: version-check
      uses: ./.github/actions/version-check
      with:
        docker-username: ${{ secrets.DOCKERHUB_USERNAME }}
        docker-token: ${{ secrets.DOCKERHUB_TOKEN }}
        fail-on-existing: 'false'
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    # Build and run tests first to guarantee image quality
    - name: Build and test
      run: |
        # Build and run tests using Dockerfile.test
        docker build -t mcp-prompts-for-devs:test -f Dockerfile.test .
        docker run --rm mcp-prompts-for-devs:test
    
    # Login to Docker Hub for pushing
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    # Build and push the production Docker image
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          wesleywillians/mcp-prompts-for-devs:latest
          wesleywillians/mcp-prompts-for-devs:${{ steps.version-check.outputs.version-tag }}
          ${{ steps.version-check.outputs.exists != 'true' && format('wesleywillians/mcp-prompts-for-devs:{0}', steps.version-check.outputs.version) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max 